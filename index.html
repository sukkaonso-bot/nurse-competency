<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบประเมินสมรรถนะเฉพาะพยาบาลวิชาชีพ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

:root{
  --paper:#F5F1E7;
  --paper-deep:#ECE5D3;
  --line:#DCD2B8;
  --ink:#26332C;
  --ink-soft:#63705F;
  --ink-faint:#9BA394;
  --teal:#0B6E5C;
  --teal-deep:#084F42;
  --teal-tint:#E1EFE9;
  --amber:#B07A28;
  --amber-tint:#F6ECD9;
  --rust:#AE4A34;
  --rust-tint:#F5E3DD;
  --card:#FCFAF3;
  --card-edge:#E6DFC9;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'IBM Plex Sans Thai',sans-serif;
  color:var(--ink);
  background:
    linear-gradient(var(--paper) 1px, transparent 1px),
    linear-gradient(90deg, var(--paper) 1px, transparent 1px),
    repeating-linear-gradient(var(--paper) 0px, var(--paper) 27px, var(--line) 28px),
    var(--paper);
  background-size:100% 100%, 100% 100%, 100% 28px, 100% 100%;
  min-height:100vh;
}
.wrap{max-width:1080px;margin:0 auto;padding:28px 24px 80px;}

.clip{display:flex;justify-content:center;margin-bottom:-14px;position:relative;z-index:2;}
.clip svg{filter:drop-shadow(0 2px 2px rgba(38,51,44,0.18));}

.header{
  background:var(--card);
  border:1px solid var(--card-edge);
  border-radius:4px;
  padding:26px 30px 22px;
  position:relative;
  box-shadow:0 1px 0 rgba(38,51,44,0.04);
}
.header::before{
  content:"";position:absolute;left:24px;right:24px;top:0;height:3px;
  background:repeating-linear-gradient(90deg, var(--teal) 0 10px, transparent 10px 16px);
}
.eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--teal-deep);font-weight:600;margin:0 0 6px;
}
h1{
  font-family:'Noto Serif Thai',serif;font-weight:700;
  font-size:26px;margin:0 0 6px;color:var(--ink);line-height:1.3;
}
.subtitle{font-size:13.5px;color:var(--ink-soft);margin:0;}
.subtitle b{color:var(--ink);font-weight:600;}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px;}
.stat{background:var(--paper-deep);border:1px solid var(--card-edge);border-radius:3px;padding:12px 14px;}
.stat .n{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;color:var(--teal-deep);}
.stat .l{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}

.progress-outer{margin-top:18px;}
.dash-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:16px;
  background:var(--teal-deep);color:#F3EFE2;border:none;border-radius:3px;padding:11px 14px;
  font-family:'IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:13.5px;cursor:pointer;
  transition:background .12s ease;
}
.dash-btn:hover{background:var(--teal);}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-bottom:6px;}
.progress-track{height:10px;background:var(--paper-deep);border:1px solid var(--card-edge);border-radius:6px;overflow:hidden;position:relative;}
.progress-fill{height:100%;background:repeating-linear-gradient(90deg,var(--teal) 0 6px, var(--teal-deep) 6px 7px);transition:width .4s ease;}

.searchbar{margin:20px 0 22px;}
.searchbar input{
  width:100%;padding:11px 14px;font-size:14px;font-family:'IBM Plex Sans Thai',sans-serif;
  border:1px solid var(--card-edge);border-radius:3px;background:var(--card);color:var(--ink);
  outline:none;
}
.searchbar input:focus{border-color:var(--teal);}
.searchbar input::placeholder{color:var(--ink-faint);}

.crumbs{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-soft);margin-bottom:16px;font-family:'IBM Plex Mono',monospace;}
.crumbs a{color:var(--teal-deep);cursor:pointer;text-decoration:none;font-weight:600;}
.crumbs a:hover{text-decoration:underline;}

.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;margin-top:6px;}
.folder{
  background:var(--card);border:1px solid var(--card-edge);border-radius:2px;
  padding:16px 16px 14px;cursor:pointer;position:relative;
  transition:transform .12s ease, box-shadow .12s ease;
}
.folder::before{
  content:attr(data-tab);position:absolute;top:-11px;left:14px;
  background:var(--teal-deep);color:#F3EFE2;font-size:10.5px;font-weight:600;
  padding:3px 9px;border-radius:2px 2px 0 0;font-family:'IBM Plex Mono',monospace;letter-spacing:.03em;
}
.folder:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(38,51,44,0.12);}
.folder h3{font-family:'Noto Serif Thai',serif;font-size:15px;margin:8px 0 8px;line-height:1.35;color:var(--ink);}
.folder .head{font-size:12px;color:var(--ink-soft);margin-bottom:10px;}
.folder .head b{color:var(--ink);font-weight:600;}
.folder .meta{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--ink-soft);margin-bottom:8px;font-family:'IBM Plex Mono',monospace;}
.mini-track{height:6px;background:var(--paper-deep);border-radius:4px;overflow:hidden;}
.mini-fill{height:100%;background:var(--teal);}
.mini-fill.done{background:var(--teal);}
.mini-fill.partial{background:var(--amber);}

.nurse-list{display:flex;flex-direction:column;gap:9px;margin-top:6px;}
.nurse-row{
  background:var(--card);border:1px solid var(--card-edge);border-radius:3px;
  padding:13px 16px;cursor:pointer;
  transition:box-shadow .12s ease, border-color .12s ease;
}
.nurse-row:hover{box-shadow:0 2px 6px rgba(38,51,44,0.1);border-color:var(--teal);}
.nurse-row-top{display:flex;align-items:center;gap:14px;}
.nurse-row .name{font-weight:600;font-size:14px;flex:1;min-width:180px;}
.nurse-row .pos{font-size:12px;color:var(--ink-soft);width:190px;}
.dots{display:flex;gap:4px;}
.dot{width:9px;height:9px;border-radius:50%;background:var(--paper-deep);border:1px solid var(--card-edge);}
.dot.pass{background:var(--teal);border-color:var(--teal-deep);}
.dot.dev{background:var(--amber);border-color:var(--amber);}
.row-status{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);width:96px;text-align:right;}
.chev{color:var(--ink-faint);}
.topics-list{list-style:none;margin:10px 0 0;padding:10px 0 0;border-top:1px dashed var(--card-edge);display:flex;flex-direction:column;gap:5px;}
.topics-list li{font-size:12px;color:var(--ink-soft);display:flex;gap:7px;}
.topics-list .tstat{flex-shrink:0;width:7px;height:7px;border-radius:50%;margin-top:5px;background:var(--paper-deep);border:1px solid var(--card-edge);}
.topics-list .tstat.pass{background:var(--teal);border-color:var(--teal-deep);}
.topics-list .tstat.dev{background:var(--amber);border-color:var(--amber);}

.unit-header{background:var(--card);border:1px solid var(--card-edge);border-radius:4px;padding:18px 22px;margin-bottom:18px;}
.unit-header h2{font-family:'Noto Serif Thai',serif;font-size:20px;margin:0 0 6px;}
.unit-header .row{font-size:13px;color:var(--ink-soft);}
.unit-header .row b{color:var(--ink);font-weight:600;}

.nurse-header{background:var(--card);border:1px solid var(--card-edge);border-radius:4px;padding:20px 24px;margin-bottom:20px;}
.nurse-header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.nurse-header h2{font-family:'Noto Serif Thai',serif;font-size:21px;margin:0 0 8px;}
.reset-btn{
  display:flex;align-items:center;gap:6px;flex-shrink:0;background:none;border:1px solid var(--card-edge);
  color:var(--ink-soft);border-radius:3px;padding:7px 12px;font-size:12.5px;cursor:pointer;
  font-family:'IBM Plex Sans Thai',sans-serif;white-space:nowrap;
}
.reset-btn:hover{border-color:var(--rust);color:var(--rust);}
.reset-btn.confirming{border-color:var(--rust);color:var(--rust);background:var(--rust-tint);}
.badge-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.badge{font-size:11.5px;font-family:'IBM Plex Mono',monospace;background:var(--paper-deep);border:1px solid var(--card-edge);color:var(--ink-soft);padding:4px 9px;border-radius:3px;}
.badge b{color:var(--ink);}

.topic-card{
  background:var(--card);border:1px solid var(--card-edge);border-radius:4px;
  padding:20px 22px;margin-bottom:16px;position:relative;overflow:hidden;
}
.topic-card .idx{
  font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--teal-deep);font-weight:600;
  letter-spacing:.06em;margin-bottom:6px;
}
.topic-card h4{font-family:'Noto Serif Thai',serif;font-size:15.5px;font-weight:600;margin:0 0 12px;line-height:1.5;padding-right:110px;}

.criteria-box{background:var(--teal-tint);border:1px solid var(--card-edge);border-radius:3px;padding:12px 14px;margin-bottom:16px;}
.criteria-box .ct{font-size:11px;font-weight:600;color:var(--teal-deep);font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;margin-bottom:8px;text-transform:uppercase;}
.criteria-box ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px;}
.criteria-box li{font-size:12.5px;color:var(--ink);line-height:1.5;padding-left:16px;position:relative;}
.criteria-box li::before{content:"–";position:absolute;left:0;color:var(--teal-deep);}


.stamp{
  position:absolute;top:16px;right:18px;border:2px solid var(--teal-deep);color:var(--teal-deep);
  font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11.5px;letter-spacing:.05em;
  padding:5px 10px;border-radius:3px;transform:rotate(-7deg);opacity:0;transition:opacity .2s ease, transform .2s ease;
  text-transform:uppercase;pointer-events:none;
}
.stamp.show{opacity:1;transform:rotate(-7deg) scale(1);}
.stamp.dev{border-color:var(--amber);color:var(--amber);}

.level-row{margin-bottom:14px;}
.level-label{font-size:12px;color:var(--ink-soft);margin-bottom:8px;}
.level-btns{display:flex;flex-direction:column;gap:6px;}
.lvl-btn{
  display:flex;align-items:baseline;gap:8px;width:100%;text-align:left;border:1px solid var(--card-edge);background:var(--paper);
  border-radius:3px;padding:8px 11px;cursor:pointer;font-family:'IBM Plex Sans Thai',sans-serif;
}
.lvl-btn .num{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;color:var(--teal-deep);flex-shrink:0;}
.lvl-btn .txt{font-size:12.5px;color:var(--ink-soft);}
.lvl-btn:hover{border-color:var(--teal);}
.lvl-btn.active{background:var(--teal-tint);border-color:var(--teal);}
.lvl-btn.active.low{background:var(--amber-tint);border-color:var(--amber);}
.lvl-btn.active .num{color:var(--ink);}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.field label{display:block;font-size:11.5px;color:var(--ink-soft);margin-bottom:5px;}
.field input, .field textarea{
  width:100%;border:1px solid var(--card-edge);border-radius:3px;background:var(--paper);
  padding:8px 10px;font-family:'IBM Plex Sans Thai',sans-serif;font-size:13px;color:var(--ink);outline:none;
}
.field input:focus, .field textarea:focus{border-color:var(--teal);}
.field textarea{resize:vertical;min-height:52px;}

.save-note{font-size:11px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace;margin-top:2px;}

.empty{text-align:center;padding:50px 20px;color:var(--ink-soft);}
.empty .big{font-family:'Noto Serif Thai',serif;font-size:17px;color:var(--ink);margin-bottom:6px;}

.back-btn{
  background:none;border:1px solid var(--card-edge);color:var(--ink-soft);border-radius:3px;
  padding:7px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;margin-bottom:16px;
}
.back-btn:hover{border-color:var(--teal);color:var(--teal-deep);}

.loading-line{text-align:center;padding:40px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:13px;}

.summary-header{background:var(--card);border:1px solid var(--card-edge);border-radius:4px;padding:20px 24px;margin-bottom:18px;position:relative;overflow:hidden;}
.summary-header::before{content:"";position:absolute;left:24px;right:24px;top:0;height:3px;background:repeating-linear-gradient(90deg, var(--amber) 0 10px, transparent 10px 16px);}
.summary-header h2{font-family:'Noto Serif Thai',serif;font-size:20px;margin:0 0 6px;}
.summary-header p{font-size:12.5px;color:var(--ink-soft);margin:0;}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.kpi{background:var(--card);border:1px solid var(--card-edge);border-radius:4px;padding:16px 16px 14px;}
.kpi .n{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;color:var(--teal-deep);line-height:1;}
.kpi .l{font-size:11.5px;color:var(--ink-soft);margin-top:6px;}
.kpi.fail .n{color:var(--rust);}
.kpi.pct .n{color:var(--amber);}

.section-card{background:var(--card);border:1px solid var(--card-edge);border-radius:4px;padding:20px 22px;margin-bottom:16px;}
.section-card h3{font-family:'Noto Serif Thai',serif;font-size:15.5px;margin:0 0 4px;}
.section-card .sub{font-size:12px;color:var(--ink-soft);margin:0 0 16px;}

.topic-rank{display:flex;flex-direction:column;gap:12px;}
.rank-item{border-bottom:1px solid var(--paper-deep);padding-bottom:12px;}
.rank-item:last-child{border-bottom:none;padding-bottom:0;}
.rank-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:6px;}
.rank-name{font-size:13px;font-weight:600;color:var(--ink);flex:1;}
.rank-score{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--rust);flex-shrink:0;}
.rank-bar-track{height:8px;background:var(--paper-deep);border-radius:4px;overflow:hidden;margin-bottom:6px;}
.rank-bar-fill{height:100%;background:linear-gradient(90deg, var(--rust) 0%, var(--amber) 100%);}
.rank-meta{font-size:11.5px;color:var(--ink-soft);margin-bottom:6px;}
.rank-rec{font-size:12px;color:var(--ink);background:var(--amber-tint);border-radius:3px;padding:8px 10px;line-height:1.5;}
.rank-rec b{color:var(--amber);font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;margin-right:5px;}

.unit-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.unit-table th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--card-edge);padding:0 8px 8px;font-weight:600;}
.unit-table td{padding:8px 8px;border-bottom:1px solid var(--paper-deep);color:var(--ink);}
.unit-table td.num{font-family:'IBM Plex Mono',monospace;text-align:right;}
.unit-table tr:last-child td{border-bottom:none;}
.unit-table .pillpass{color:var(--teal-deep);font-weight:600;}
.unit-table .pillfail{color:var(--rust);font-weight:600;}

.shared-note{
  font-size:11.5px;color:var(--ink-faint);margin-top:14px;font-family:'IBM Plex Mono',monospace;
  border-top:1px dashed var(--card-edge);padding-top:12px;
}

@media (max-width:640px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .field-row{grid-template-columns:1fr;}
  .nurse-row{flex-wrap:wrap;}
  .row-status{width:auto;}
  h1{font-size:21px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .unit-table{font-size:11px;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="clip">
    <svg width="120" height="34" viewBox="0 0 120 34">
      <rect x="40" y="0" width="40" height="14" rx="3" fill="#8E9385"/>
      <rect x="46" y="10" width="28" height="20" rx="4" fill="none" stroke="#5B6055" stroke-width="5"/>
    </svg>
  </div>

  <div class="header">
    <p class="eyebrow">แฟ้มบันทึกผลการประเมิน</p>
    <h1>ระบบประเมินสมรรถนะเฉพาะพยาบาลวิชาชีพ</h1>
    <p class="subtitle">รวบรวมรายชื่อพยาบาล หัวข้อสมรรถนะเฉพาะประจำหน่วยงาน และบันทึกผลการประเมินไว้ในที่เดียว</p>
    <div class="stats-row" id="statsRow"></div>
    <div class="progress-outer">
      <div class="progress-label"><span>ความคืบหน้าการประเมินทั้งหมด</span><span id="progressPct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <button class="dash-btn" onclick="setState({view:'summary'})">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      สรุปผลการประเมินสมรรถนะเฉพาะ ปี 2569
    </button>
  </div>

  <div class="searchbar">
    <input type="text" id="searchInput" placeholder="ค้นหาชื่อพยาบาล หรือ ชื่อหน่วยงาน...">
  </div>

  <div id="crumbs" class="crumbs" style="display:none;"></div>
  <div id="content"></div>

  <p class="shared-note">ข้อมูลผลการประเมินถูกบันทึกแบบใช้ร่วมกัน (shared) — ผู้ใช้ทุกคนที่เปิดแอปนี้จะเห็นและแก้ไขข้อมูลเดียวกัน</p>

const LEVELS = [
  {v:1, t:"ยังไม่สามารถปฏิบัติได้ ต้องมีผู้ควบคุมดูแลใกล้ชิด"},
  {v:2, t:"ปฏิบัติได้บางส่วน ต้องมีผู้ชี้แนะเป็นระยะ"},
  {v:3, t:"ปฏิบัติได้ด้วยตนเองตามมาตรฐาน"},
  {v:4, t:"ปฏิบัติได้คล่องแคล่ว วิเคราะห์สถานการณ์ได้ดี"},
  {v:5, t:"ปฏิบัติได้ดีเยี่ยม เป็นแบบอย่าง สอนผู้อื่นได้"}
];
const PASS_LEVEL = 3;

let evaluations = {};
let state = { view:'dashboard', unit:null, nurseId:null, search:'' };
let storageReady = false;

function keyFor(nurseId, topicIdx){ return nurseId + '_' + topicIdx; }

async function loadEvaluations(){
  try{
    const res = await window.storage.get('evaluations', true);
    evaluations = res && res.value ? JSON.parse(res.value) : {};
  }catch(e){
    evaluations = {};
  }
  storageReady = true;
  render();
}

let saveTimer = null;
function persist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{
      await window.storage.set('evaluations', JSON.stringify(evaluations), true);
    }catch(e){}
  }, 250);
}

function unitsIndex(){
  const map = {};
  NURSE_DATA.forEach(r=>{
    if(!map[r.unit]) map[r.unit] = { unit:r.unit, head:r.head, headPos:r.headPos, nurses:[] };
    map[r.unit].nurses.push(r);
  });
  return Object.values(map).sort((a,b)=>a.unit.localeCompare(b.unit,'th'));
}

function topicStatus(nurseId, topicIdx){
  const e = evaluations[keyFor(nurseId, topicIdx)];
  if(!e || !e.level) return 'none';
  return e.level >= PASS_LEVEL ? 'pass' : 'dev';
}

function nurseStats(nurse){
  let done=0, dev=0;
  nurse.topics.forEach((_,i)=>{
    const s = topicStatus(nurse.id, i);
    if(s==='pass') done++;
    if(s==='dev') dev++;
  });
  return {total:nurse.topics.length, done, dev};
}

function unitStats(unit){
  let total=0, done=0;
  unit.nurses.forEach(n=>{
    const s = nurseStats(n);
    total += s.total; done += s.done + s.dev;
  });
  return {total, done};
}

function overallStats(){
  let totalTopics=0, evaluatedTopics=0, totalNurses=NURSE_DATA.length, totalUnits=unitsIndex().length;
  NURSE_DATA.forEach(n=>{
    n.topics.forEach((_,i)=>{
      totalTopics++;
      if(topicStatus(n.id,i)!=='none') evaluatedTopics++;
    });
  });
  return {totalTopics, evaluatedTopics, totalNurses, totalUnits};
}

function nurseCompletion(){
  return NURSE_DATA.map(n=>{
    const total = n.topics.length;
    let evaluatedCount = 0, allPass = total>0;
    n.topics.forEach((_,idx)=>{
      const e = evaluations[keyFor(n.id, idx)];
      if(e && e.level){
        evaluatedCount++;
        if(e.level < PASS_LEVEL) allPass = false;
      } else {
        allPass = false;
      }
    });
    const completed = total>0 && evaluatedCount===total;
    return {nurse:n, total, evaluatedCount, completed, passed: completed && allPass};
  });
}

function topicAggregates(){
  const map = {};
  NURSE_DATA.forEach(n=>{
    n.topics.forEach((topic, idx)=>{
      const e = evaluations[keyFor(n.id, idx)];
      if(e && e.level){
        if(!map[topic]) map[topic] = {topic, sum:0, count:0, devCount:0};
        map[topic].sum += e.level;
        map[topic].count += 1;
        if(e.level < PASS_LEVEL) map[topic].devCount += 1;
      }
    });
  });
  return Object.values(map).map(x=>Object.assign({}, x, {avg: x.sum / x.count}));
}

function recommendFor(avg){
  if(avg < 2) return "ควรจัดอบรมเชิงปฏิบัติการอย่างเข้มข้น พร้อมมอบหมายพี่เลี้ยงควบคุมดูแลใกล้ชิดจนสามารถปฏิบัติได้ตามมาตรฐาน แล้วประเมินซ้ำ";
  if(avg < 3) return "ควรทบทวนความรู้ตามแนวปฏิบัติ ฝึกปฏิบัติซ้ำภายใต้การกำกับดูแลของหัวหน้างานหรือพี่เลี้ยง แล้วนัดประเมินซ้ำภายใน 1-2 เดือน";
  if(avg < 4) return "ควรเพิ่มโอกาสฝึกปฏิบัติในสถานการณ์จริงหรือสถานการณ์จำลอง (simulation) เพื่อเสริมความมั่นใจและความชำนาญ";
  return "อยู่ในเกณฑ์ดี ควรรักษามาตรฐานการปฏิบัติต่อเนื่องและส่งเสริมให้เป็นพี่เลี้ยงสอนผู้อื่นได้";
}

function esc(s){
  return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderStats(){
  const s = overallStats();
  const pct = s.totalTopics ? Math.round(s.evaluatedTopics/s.totalTopics*100) : 0;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="n">${s.totalUnits}</div><div class="l">หน่วยงาน</div></div>
    <div class="stat"><div class="n">${s.totalNurses}</div><div class="l">พยาบาลทั้งหมด</div></div>
    <div class="stat"><div class="n">${s.totalTopics}</div><div class="l">หัวข้อประเมินทั้งหมด</div></div>
    <div class="stat"><div class="n">${pct}%</div><div class="l">ประเมินแล้ว</div></div>
  `;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function setState(next){
  state = Object.assign(state, next);
  state.confirmResetNurse = null;
  render();
}

function renderCrumbs(){
  const el = document.getElementById('crumbs');
  if(state.view==='dashboard' || state.view==='summary'){ el.style.display='none'; return; }
  el.style.display='flex';
  let html = `<a onclick="setState({view:'dashboard'})">ภาพรวมทั้งหมด</a>`;
  if(state.view==='unit' || state.view==='nurse'){
    html += ` <span>/</span> <a onclick="setState({view:'unit', nurseId:null})">${esc(state.unit)}</a>`;
  }
  if(state.view==='nurse'){
    const n = NURSE_DATA.find(x=>x.id===state.nurseId);
    html += ` <span>/</span> <span>${esc(n?n.name:'')}</span>`;
  }
  el.innerHTML = html;
}

function renderDashboard(){
  const q = state.search.trim().toLowerCase();
  let units = unitsIndex();
  if(q){
    units = units.map(u=>{
      const matchUnit = u.unit.toLowerCase().includes(q);
      const nurses = u.nurses.filter(n=>n.name.toLowerCase().includes(q));
      if(matchUnit) return u;
      if(nurses.length) return Object.assign({}, u, {nurses});
      return null;
    }).filter(Boolean);
  }
  if(!units.length){
    return `<div class="empty"><div class="big">ไม่พบรายการที่ค้นหา</div>ลองค้นหาด้วยชื่อพยาบาลหรือชื่อหน่วยงานอื่น</div>`;
  }
  return `<div class="folder-grid">` + units.map(u=>{
    const st = unitStats(u);
    const pct = st.total ? Math.round(st.done/st.total*100) : 0;
    return `<div class="folder" data-unit="${esc(u.unit)}" data-tab="หน่วยงาน">
      <h3>${esc(u.unit)}</h3>
      <div class="head">หัวหน้าผู้ประเมิน: <b>${esc(u.head)}</b></div>
      <div class="meta"><span>${u.nurses.length} ราย</span><span>${pct}%</span></div>
      <div class="mini-track"><div class="mini-fill ${pct===100?'done':'partial'}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('') + `</div>`;
}

function renderUnit(){
  const units = unitsIndex();
  let unit = units.find(u=>u.unit===state.unit);
  if(!unit) return `<div class="empty">ไม่พบหน่วยงานนี้</div>`;
  const q = state.search.trim().toLowerCase();
  let nurses = unit.nurses;
  if(q) nurses = nurses.filter(n=>n.name.toLowerCase().includes(q));
  const rows = nurses.map(n=>{
    const st = nurseStats(n);
    const dots = n.topics.map((_,i)=>{
      const s = topicStatus(n.id,i);
      return `<div class="dot ${s==='pass'?'pass':s==='dev'?'dev':''}"></div>`;
    }).join('');
    const statusTxt = st.done+st.dev===0 ? 'ยังไม่ประเมิน' : (st.done+st.dev===st.total ? 'ครบแล้ว' : (st.done+st.dev)+'/'+st.total);
    const topicItems = n.topics.map((t,i)=>{
      const s = topicStatus(n.id,i);
      return `<li><span class="tstat ${s==='pass'?'pass':s==='dev'?'dev':''}"></span>${i+1}. ${esc(t)}</li>`;
    }).join('');
    return `<div class="nurse-row" onclick="setState({view:'nurse', nurseId:${n.id}})">
      <div class="nurse-row-top">
        <div class="name">${esc(n.name)}</div>
        <div class="pos">${esc(n.pos)}</div>
        <div class="dots">${dots}</div>
        <div class="row-status">${statusTxt}</div>
        <div class="chev">›</div>
      </div>
      <ul class="topics-list">${topicItems}</ul>
    </div>`;
  }).join('');
  return `
    <button class="back-btn" onclick="setState({view:'dashboard'})">‹ กลับสู่ภาพรวม</button>
    <div class="unit-header">
      <h2>${esc(unit.unit)}</h2>
      <div class="row">หัวหน้าผู้ประเมิน: <b>${esc(unit.head)}</b> (${esc(unit.headPos)}) &nbsp;·&nbsp; พยาบาลในหน่วยงาน <b>${unit.nurses.length}</b> ราย</div>
    </div>
    <div class="nurse-list">${rows || '<div class="empty">ไม่พบรายชื่อที่ค้นหา</div>'}</div>
  `;
}

function renderNurse(){
  const n = NURSE_DATA.find(x=>x.id===state.nurseId);
  if(!n) return `<div class="empty">ไม่พบข้อมูลพยาบาล</div>`;
  const topicCards = n.topics.map((topic, idx)=>{
    const k = keyFor(n.id, idx);
    const e = evaluations[k] || {};
    const level = e.level || 0;
    const isPass = level>=PASS_LEVEL;
    const isDev = level>0 && level<3;
    const stampClass = level ? (isPass ? 'stamp show' : 'stamp show dev') : 'stamp';
    const stampText = isPass ? 'ผ่านเกณฑ์' : (isDev ? 'ต้องพัฒนาเพิ่ม' : '');
    const levelBtns = LEVELS.map(l=>{
      const active = l.v===level;
      return `<button class="lvl-btn ${active?'active':''} ${active && l.v<PASS_LEVEL ? 'low':''}" onclick="setLevel(${n.id},${idx},${l.v})">
        <span class="num">${l.v}</span><span class="txt">${esc(l.t)}</span>
      </button>`;
    }).join('');
    const criteria = TOPIC_CRITERIA[topic] || [];
    const criteriaBox = criteria.length ? `<div class="criteria-box">
        <div class="ct">การพยาบาลที่ควรปฏิบัติในหัวข้อนี้</div>
        <ul>${criteria.map(c=>`<li>${esc(c)}</li>`).join('')}</ul>
      </div>` : '';
    return `<div class="topic-card">
      <div class="${stampClass}">${stampText}</div>
      <div class="idx">หัวข้อที่ ${idx+1} จาก ${n.topics.length}</div>
      <h4>${esc(topic)}</h4>
      ${criteriaBox}
      <div class="level-row">
        <div class="level-label">ระดับสมรรถนะที่ประเมิน</div>
        <div class="level-btns">${levelBtns}</div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>วันที่ประเมิน</label>
          <input type="date" value="${e.date||''}" onchange="setField(${n.id},${idx},'date',this.value)">
        </div>
        <div class="field">
          <label>ผู้ประเมิน</label>
          <input type="text" value="${esc(e.evaluator!==undefined?e.evaluator:n.head)}" placeholder="ชื่อผู้ประเมิน" onchange="setField(${n.id},${idx},'evaluator',this.value)">
        </div>
      </div>
      <div class="field">
        <label>หมายเหตุ / ข้อเสนอแนะ</label>
        <textarea placeholder="บันทึกข้อสังเกตเพิ่มเติม (ถ้ามี)" onchange="setField(${n.id},${idx},'note',this.value)">${esc(e.note||'')}</textarea>
      </div>
      <div class="save-note">${e.updatedAt ? 'บันทึกล่าสุด '+new Date(e.updatedAt).toLocaleString('th-TH') : 'ยังไม่มีการบันทึกผล'}</div>
    </div>`;
  }).join('');

  const resetConfirming = state.confirmResetNurse === n.id;
  return `
    <button class="back-btn" onclick="setState({view:'unit', nurseId:null})">‹ กลับไปหน่วยงาน</button>
    <div class="nurse-header">
      <div class="nurse-header-top">
        <h2>${esc(n.name)}</h2>
        <button class="reset-btn ${resetConfirming?'confirming':''}" onclick="handleResetNurse(${n.id})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          ${resetConfirming ? 'ยืนยันลบผลประเมินทั้งหมด?' : 'ล้างผลประเมิน'}
        </button>
      </div>
      <div class="badge-row">
        <div class="badge">ตำแหน่ง <b>${esc(n.pos)}</b></div>
        <div class="badge">หน่วยงาน <b>${esc(n.unit)}</b></div>
        <div class="badge">หัวหน้าผู้ประเมิน <b>${esc(n.head)}</b></div>
        <div class="badge">หัวข้อประเมิน <b>${n.topics.length}</b> เรื่อง</div>
      </div>
    </div>
    ${topicCards}
  `;
}

function handleResetNurse(nurseId){
  if(state.confirmResetNurse !== nurseId){
    state.confirmResetNurse = nurseId;
    render();
    return;
  }
  const n = NURSE_DATA.find(x=>x.id===nurseId);
  if(n){
    n.topics.forEach((_,idx)=>{ delete evaluations[keyFor(nurseId, idx)]; });
  }
  state.confirmResetNurse = null;
  persist();
  render();
}

function renderSummary(){
  const completions = nurseCompletion();
  const totalNurses = completions.length;
  const completedList = completions.filter(c=>c.completed);
  const completedCount = completedList.length;
  const passedCount = completedList.filter(c=>c.passed).length;
  const failedCount = completedCount - passedCount;
  const passPct = completedCount ? Math.round(passedCount/completedCount*100) : 0;
  const pendingCount = totalNurses - completedCount;

  const aggs = topicAggregates().sort((a,b)=>a.avg-b.avg);
  const lowTopics = aggs.slice(0, 8);

  const unitRows = unitsIndex().map(u=>{
    const uc = completions.filter(c=>u.nurses.some(n=>n.id===c.nurse.id));
    const uCompleted = uc.filter(c=>c.completed).length;
    const uPassed = uc.filter(c=>c.passed).length;
    const uFailed = uCompleted - uPassed;
    return {unit:u.unit, total:u.nurses.length, completed:uCompleted, passed:uPassed, failed:uFailed};
  }).filter(r=>r.completed>0).sort((a,b)=>b.completed-a.completed);

  const kpiHtml = `
    <div class="kpi-grid">
      <div class="kpi"><div class="n">${completedCount}</div><div class="l">ประเมินครบทุกหัวข้อ (จาก ${totalNurses} ราย)</div></div>
      <div class="kpi"><div class="n">${passedCount}</div><div class="l">ผ่านการประเมิน</div></div>
      <div class="kpi fail"><div class="n">${failedCount}</div><div class="l">ไม่ผ่าน / ต้องพัฒนา</div></div>
      <div class="kpi pct"><div class="n">${passPct}%</div><div class="l">คิดเป็นร้อยละที่ผ่าน (จากผู้ประเมินครบ)</div></div>
    </div>
  `;

  const pendingNote = pendingCount>0
    ? `<p class="sub">ยังมีพยาบาลอีก <b>${pendingCount}</b> ราย ที่ประเมินยังไม่ครบทุกหัวข้อ ผลสรุปนี้นับเฉพาะผู้ที่ประเมินครบแล้ว</p>`
    : `<p class="sub">ประเมินครบทุกรายแล้ว</p>`;

  let lowTopicsHtml;
  if(!lowTopics.length){
    lowTopicsHtml = `<p class="sub">ยังไม่มีผลการประเมินเพียงพอสำหรับวิเคราะห์หัวข้อที่ควรพัฒนา</p>`;
  } else {
    lowTopicsHtml = `<div class="topic-rank">` + lowTopics.map((t,i)=>{
      const pct = Math.round(t.avg/5*100);
      const devPct = Math.round(t.devCount/t.count*100);
      return `<div class="rank-item">
        <div class="rank-top">
          <div class="rank-name">${i+1}. ${esc(t.topic)}</div>
          <div class="rank-score">เฉลี่ย ${t.avg.toFixed(1)}/5</div>
        </div>
        <div class="rank-bar-track"><div class="rank-bar-fill" style="width:${pct}%"></div></div>
        <div class="rank-meta">ประเมินแล้ว ${t.count} ครั้ง &nbsp;·&nbsp; ต่ำกว่าเกณฑ์ผ่าน ${t.devCount} ครั้ง (${devPct}%)</div>
        <div class="rank-rec"><b>แนวทางพัฒนา</b>${esc(recommendFor(t.avg))}</div>
      </div>`;
    }).join('') + `</div>`;
  }

  const unitTableHtml = unitRows.length ? `
    <table class="unit-table">
      <thead><tr><th>หน่วยงาน</th><th style="text-align:right">ประเมินครบ</th><th style="text-align:right">ผ่าน</th><th style="text-align:right">ไม่ผ่าน</th><th style="text-align:right">ร้อยละผ่าน</th></tr></thead>
      <tbody>${unitRows.map(r=>{
        const pct = r.completed ? Math.round(r.passed/r.completed*100) : 0;
        return `<tr>
          <td>${esc(r.unit)}</td>
          <td class="num">${r.completed}/${r.total}</td>
          <td class="num pillpass">${r.passed}</td>
          <td class="num pillfail">${r.failed}</td>
          <td class="num">${pct}%</td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  ` : `<p class="sub">ยังไม่มีหน่วยงานใดประเมินครบ</p>`;

  return `
    <button class="back-btn" onclick="setState({view:'dashboard'})">‹ กลับสู่ภาพรวม</button>
    <div class="summary-header">
      <h2>สรุปผลการประเมินสมรรถนะเฉพาะพยาบาลวิชาชีพ ปี 2569</h2>
      <p>ภาพรวมผลการประเมินทั้งหมด ${totalNurses} ราย ${unitsIndex().length} หน่วยงาน — อัปเดตอัตโนมัติตามผลที่บันทึกล่าสุด</p>
    </div>
    ${kpiHtml}
    <div class="section-card">
      <h3>สถานะการประเมิน</h3>
      ${pendingNote}
    </div>
    <div class="section-card">
      <h3>เรื่องที่ได้คะแนนต่ำสุด และหัวข้อที่ควรพัฒนา</h3>
      <p class="sub">เรียงจากคะแนนเฉลี่ยต่ำสุดไปสูง (นับเฉพาะหัวข้อที่มีการประเมินแล้วอย่างน้อย 1 ครั้ง)</p>
      ${lowTopicsHtml}
    </div>
    <div class="section-card">
      <h3>สรุปผลรายหน่วยงาน</h3>
      <p class="sub">เฉพาะหน่วยงานที่มีผู้ประเมินครบทุกหัวข้ออย่างน้อย 1 ราย</p>
      ${unitTableHtml}
    </div>
  `;
}

function setLevel(nurseId, topicIdx, level){
  const k = keyFor(nurseId, topicIdx);
  const prev = evaluations[k] || {};
  const newLevel = prev.level===level ? 0 : level;
  evaluations[k] = Object.assign({}, prev, {level:newLevel, updatedAt:Date.now()});
  if(prev.evaluator===undefined){
    const n = NURSE_DATA.find(x=>x.id===nurseId);
    evaluations[k].evaluator = n ? n.head : '';
  }
  persist();
  render();
}

function setField(nurseId, topicIdx, field, value){
  const k = keyFor(nurseId, topicIdx);
  const prev = evaluations[k] || {};
  evaluations[k] = Object.assign({}, prev, {[field]:value, updatedAt:Date.now()});
  persist();
  render();
}

function render(){
  renderStats();
  renderCrumbs();
  const c = document.getElementById('content');
  if(!storageReady){
    c.innerHTML = '<div class="loading-line">กำลังโหลดข้อมูลการประเมิน...</div>';
    return;
  }
  if(state.view==='dashboard') c.innerHTML = renderDashboard();
  else if(state.view==='unit') c.innerHTML = renderUnit();
  else if(state.view==='nurse') c.innerHTML = renderNurse();
  else if(state.view==='summary') c.innerHTML = renderSummary();
}

document.getElementById('content').addEventListener('click', (e)=>{
  const folder = e.target.closest('.folder');
  if(folder && folder.dataset.unit){
    setState({view:'unit', unit:folder.dataset.unit, nurseId:null});
  }
});

document.getElementById('searchInput').addEventListener('input', (e)=>{
  state.search = e.target.value;
  if(state.view==='nurse') state.view='dashboard';
  render();
});

loadEvaluations();
</script>
